<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Редактор слоев аватара</title>
  <style>
    :root {
      --bg: #1f1b16;
      --panel: #2b241b;
      --line: #8a5a25;
      --paper: #ead39a;
      --ink: #f8e7b6;
      --muted: #bca578;
      --gold: #e9a81a;
      --green: #497f3d;
      --red: #a84836;
      --stage-size: min(512px, calc(100vw - 36px));
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 15px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    header {
      padding: 14px 18px;
      border-bottom: 2px solid var(--line);
      background: #7b4a19;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: .02em;
    }

    main {
      display: grid;
      grid-template-columns: 280px minmax(540px, 1fr) 390px;
      gap: 14px;
      padding: 14px;
    }

    section {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--gold);
      text-transform: uppercase;
    }

    button, select, input, textarea {
      font: inherit;
    }

    button {
      border: 2px solid #5f3c18;
      background: var(--green);
      color: white;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      min-height: 44px;
    }

    button.secondary { background: #74522a; }
    button.danger { background: var(--red); }
    button:active { transform: translateY(1px); }

    .stack {
      position: relative;
      width: var(--stage-size);
      aspect-ratio: 1;
      margin: 0 auto;
      background:
        linear-gradient(90deg, rgba(0,0,0,.12) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,.12) 1px, transparent 1px),
        var(--paper);
      background-size: 32px 32px;
      border: 3px solid var(--line);
      overflow: hidden;      user-select: none;
      touch-action: none;
    }

    .layer-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .crosshair {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 49.8%, rgba(255,255,255,.35) 50%, transparent 50.2%),
        linear-gradient(transparent 49.8%, rgba(255,255,255,.35) 50%, transparent 50.2%);
    }

    .layer-row {
      display: grid;
      grid-template-columns: 26px 1fr 42px;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    .layer-row.active {
      border-color: var(--gold);
      background: rgba(233,168,26,.12);
    }

    .layer-row span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini {
      color: var(--muted);
      font-size: 12px;
    }

    label {
      display: block;
      margin: 9px 0 4px;
      color: var(--muted);
    }

    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      border: 1px solid #6d4a22;
      border-radius: 6px;
      background: #17130f;
      color: var(--ink);
      padding: 7px;
    }

    input[type="range"] {
      width: 100%;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 8px;
      align-items: center;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
    }

    .status {
      color: var(--muted);
      min-height: 20px;
      margin-top: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    .preview-panel {
      min-width: 0;
    }

    .nudge-pad {
      display: grid;
      grid-template-columns: repeat(3, minmax(56px, 1fr));
      gap: 8px;
      max-width: 260px;
      margin: 12px auto 0;
    }

    .nudge-pad button {
      font-size: 18px;
      padding: 8px;
      touch-action: manipulation;
    }

    .nudge-pad .empty {
      visibility: hidden;
    }

    .scale-pad {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-width: 360px;
      margin: 10px auto 0;
    }

    .scale-pad button {
      touch-action: manipulation;
    }

    .mobile-summary {
      display: none;
      color: var(--muted);
      margin: 8px 0 0;
      text-align: center;
    }

    @media (max-width: 1250px) {
      main {
        grid-template-columns: 260px 1fr;
      }
      .export-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      :root {
        --stage-size: min(94vw, 512px);
      }

      body {
        font-size: 16px;
      }

      header {
        padding: 10px 12px;
        align-items: flex-start;
      }

      h1 {
        font-size: 18px;
      }

      header .mini {
        display: none;
      }

      main {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }

      section {
        padding: 10px;
        border-radius: 7px;
      }

      .preview-panel {
        order: -1;
      }

      .layer-row {
        grid-template-columns: 34px 1fr 52px;
        min-height: 48px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .preview-panel .buttons {
        grid-template-columns: 1fr;
      }

      .grid2 {
        grid-template-columns: 1fr 86px;
      }

      input[type="text"], input[type="number"], select, textarea {
        min-height: 44px;
        font-size: 16px;
      }

      input[type="range"] {
        min-height: 38px;
      }

      textarea {
        min-height: 130px;
      }

      .mobile-summary {
        display: block;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>Редактор слоев аватара</h1>
  <div class="mini">Перетаскивай выбранный слой. Стрелки двигают на 1 px, Shift+стрелки - на 5 px.</div>
</header>

<main>
  <section>
    <h2>Слои</h2>
    <div id="layerList"></div>
    <div class="buttons">
      <button class="secondary" id="selectPrev">Выше</button>
      <button class="secondary" id="selectNext">Ниже</button>
      <button class="danger" id="resetAll">Сбросить все</button>
    </div>
    <p class="hint">
      Координаты используют то же логическое поле 128x128, что и PNG-слои.
      Предпросмотр показан в увеличенном масштабе.
    </p>
  </section>

  <section class="preview-panel">
    <h2>Предпросмотр</h2>
    <div id="mobileSummary" class="mobile-summary"></div>
    <div id="stage" class="stack">
      <div class="crosshair"></div>
    </div>
    <div class="nudge-pad" aria-label="Сдвинуть выбранный слой">
      <button class="empty" tabindex="-1"></button>
      <button data-nudge="0,-1" aria-label="Сдвинуть вверх">&uarr;</button>
      <button class="empty" tabindex="-1"></button>
      <button data-nudge="-1,0" aria-label="Сдвинуть влево">&larr;</button>
      <button data-nudge="0,1" aria-label="Сдвинуть вниз">&darr;</button>
      <button data-nudge="1,0" aria-label="Сдвинуть вправо">&rarr;</button>
    </div>
    <div class="scale-pad" aria-label="Изменить размер выбранного слоя">
      <button class="secondary" data-scale="-0.03">- Уменьшить</button>
      <button class="secondary" data-scale="0.03">+ Увеличить</button>
    </div>
    <div class="scale-pad" aria-label="Rotate selected layer">
      <button class="secondary" data-rotate="-5">-5&deg;</button>
      <button class="secondary" data-rotate="5">+5&deg;</button>
    </div>
    <div class="buttons">
      <button id="copyJson">Копировать JSON</button>
      <button class="secondary" id="copyDart">Копировать карту Dart</button>
      <button class="secondary" id="downloadJson">Скачать JSON</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="export-panel">
    <h2>Выбранный слой</h2>
    <label>Слой</label>
    <select id="layerSelect"></select>

    <label>Путь к изображению</label>
    <select id="assetPreset"></select>
    <input id="assetPath" type="text" spellcheck="false">

    <label><input id="visible" type="checkbox"> Видимый</label>

    <label>dx</label>
    <div class="grid2">
      <input id="dxRange" type="range" min="-96" max="96" step="0.25">
      <input id="dx" type="number" step="0.25">
    </div>

    <label>dy</label>
    <div class="grid2">
      <input id="dyRange" type="range" min="-96" max="96" step="0.25">
      <input id="dy" type="number" step="0.25">
    </div>

    <label>масштаб</label>
    <div class="grid2">
      <input id="scaleRange" type="range" min="0.1" max="1.8" step="0.01">
      <input id="scale" type="number" step="0.01">
    </div>

    <label>угол</label>
    <div class="grid2">
      <input id="rotationRange" type="range" min="-180" max="180" step="1">
      <input id="rotation" type="number" step="1">
    </div>

    <div class="buttons">
      <button id="resetLayer" class="secondary">Сбросить слой</button>
      <button id="hideOthers" class="secondary">Только этот</button>
      <button id="showAll" class="secondary">Показать все</button>
    </div>

    <label>Экспорт / импорт JSON</label>
    <textarea id="jsonBox" spellcheck="false"></textarea>
    <div class="buttons">
      <button id="applyJson">Применить JSON</button>
    </div>
  </section>
</main>

const defaults = [
  { key: 'background', label: 'Фон', dx: -0.81, dy: -0.07, scale: 1, rotation: 0, visible: true, path: assetGroups.background[0] },
  { key: 'aura', label: 'Аура уровня', dx: -0.74, dy: 11.64, scale: 1.2, rotation: 0, visible: true, path: assetGroups.aura[1] },
  { key: 'hairBack', label: 'Волосы сзади', dx: -1.04, dy: -35.6, scale: 0.19, rotation: 0, visible: true, path: assetGroups.hairBack[0] },
  { key: 'outfit', label: 'Костюм', dx: -0.3, dy: 9.18, scale: 0.82, rotation: 0, visible: true, path: defaultHqOutfit },
  { key: 'head', label: 'Голова', dx: -0.71, dy: -35.3, scale: 0.22, rotation: 0, visible: true, path: assetGroups.head[0] },
  { key: 'eyes', label: 'Глаза', dx: -0.91, dy: -34.18, scale: 0.19, rotation: 0, visible: true, path: assetGroups.eyes[0] },
  { key: 'hairFront', label: 'Волосы спереди', dx: -1.04, dy: -38.51, scale: 0.16, rotation: 0, visible: true, path: assetGroups.hairFront[0] },
  { key: 'weapon', label: 'Оружие', dx: 12.74, dy: 19.6, scale: 0.2, rotation: 0, visible: true, path: assetGroups.weapon[1] },
  { key: 'lantern', label: 'Фонарь', dx: -18.72, dy: 20.43, scale: 0.21, rotation: 0, visible: true, path: assetGroups.lantern[0] },
  { key: 'frame', label: 'Рамка', dx: 0.07, dy: -0.82, scale: 1.15, rotation: 0, visible: true, path: assetGroups.frame[0] }
];

let layers = JSON.parse(JSON.stringify(defaults));
let selected = 'outfit';
let dragging = false;
let dragStart = null;

const stage = document.getElementById('stage');
const layerList = document.getElementById('layerList');
const layerSelect = document.getElementById('layerSelect');
const assetPreset = document.getElementById('assetPreset');
const assetPath = document.getElementById('assetPath');
const visible = document.getElementById('visible');
const dx = document.getElementById('dx');
const dy = document.getElementById('dy');
const scale = document.getElementById('scale');
const rotation = document.getElementById('rotation');
const dxRange = document.getElementById('dxRange');
const dyRange = document.getElementById('dyRange');
const scaleRange = document.getElementById('scaleRange');
const rotationRange = document.getElementById('rotationRange');
const jsonBox = document.getElementById('jsonBox');
const status = document.getElementById('status');
const mobileSummary = document.getElementById('mobileSummary');

function zoom() {
  return stage.clientWidth / LOGICAL_SIZE;
}

function normalizedPath(path) {
  return path.replace(/^\.\.\//, '');
}

function assetSource(path) {
  if (!path) return '';
  return embeddedAssets[path] || embeddedAssets[normalizedPath(path)] || path;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function current() {
  return layers.find(l => l.key === selected);
}

function layerExport() {
  const out = {
    version: 1,
    coordinateSpace: 128,
    semantics: 'Flutter-like: translate(dx, dy), rotate(deg), then scale around center',
    layers: {}
  };
  for (const l of layers) {
    out.layers[l.key] = {
      path: normalizedPath(l.path),
      visible: l.visible,
      dx: Number(l.dx.toFixed(2)),
      dy: Number(l.dy.toFixed(2)),
      scale: Number(l.scale.toFixed(3)),
      rotation: Number((l.rotation || 0).toFixed(1))
    };
  }
  return out;
}

function renderStage() {
  stage.querySelectorAll('.layer-img').forEach(el => el.remove());
  const crosshair = stage.querySelector('.crosshair');
  const z = zoom();
  for (const l of layers) {
    if (!l.visible || !l.path) continue;
    const img = document.createElement('img');
    img.className = 'layer-img';
    img.src = assetSource(l.path);
    img.alt = l.label;
    img.style.transform = `translate(${l.dx * z}px, ${l.dy * z}px) rotate(${l.rotation || 0}deg) scale(${l.scale})`;
    img.style.opacity = l.key === selected ? '1' : '.92';
    img.onerror = () => setStatus(`Не удалось загрузить: ${normalizedPath(l.path)}`);
    stage.insertBefore(img, crosshair);
  }
}

function renderLayerList() {
  layerList.innerHTML = '';
  layerSelect.innerHTML = '';
  for (const l of layers) {
    const row = document.createElement('div');
    row.className = `layer-row${l.key === selected ? ' active' : ''}`;
    row.innerHTML = `<input type="checkbox" ${l.visible ? 'checked' : ''}><span>${l.label}</span><span class="mini">${l.scale.toFixed(2)} / ${Math.round(l.rotation || 0)}\u00b0</span>`;
    row.onclick = e => {
      if (e.target.type === 'checkbox') {
        l.visible = e.target.checked;
      }
      selected = l.key;
      sync();
    };
    layerList.appendChild(row);

    const opt = document.createElement('option');
    opt.value = l.key;
    opt.textContent = l.label;
    layerSelect.appendChild(opt);
  }
  layerSelect.value = selected;
}

function renderControls() {
  const l = current();
  const presets = assetGroups[l.key] || [''];
  assetPreset.innerHTML = '';
  for (const p of presets) {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p ? p.split('/').pop() : '(нет)';
    assetPreset.appendChild(opt);
  }
  if (!presets.includes(l.path)) {
    const custom = document.createElement('option');
    custom.value = l.path;
    custom.textContent = '(свой путь)';
    assetPreset.appendChild(custom);
  }
  assetPreset.value = l.path;
  assetPath.value = l.path;
  visible.checked = l.visible;
  dx.value = dxRange.value = l.dx;
  dy.value = dyRange.value = l.dy;
  scale.value = scaleRange.value = l.scale;
  rotation.value = rotationRange.value = l.rotation || 0;
  jsonBox.value = JSON.stringify(layerExport(), null, 2);
  mobileSummary.textContent = `${l.label}: dx ${Number(l.dx).toFixed(2)}, dy ${Number(l.dy).toFixed(2)}, масштаб ${Number(l.scale).toFixed(2)}, угол ${Math.round(l.rotation || 0)}\u00b0`;
}

function sync() {
  renderLayerList();
  renderControls();
  renderStage();
}

function setStatus(text) {
  status.textContent = text;
  if (text) setTimeout(() => { if (status.textContent === text) status.textContent = ''; }, 2500);
}

async function copyText(text, okMessage) {
  jsonBox.value = text;
  try {
    if (!navigator.clipboard) throw new Error('clipboard unavailable');
    await navigator.clipboard.writeText(text);
    setStatus(okMessage);
  } catch (_) {
    jsonBox.focus();
    jsonBox.select();
    setStatus('Текст готов в поле ниже');
  }
}

function updateSelected(field, value) {
  const l = current();
  if (field === 'path') l.path = value;
  else if (field === 'visible') l.visible = value;
  else l[field] = Number(value);
  sync();
}

function selectByDelta(delta) {
  const i = layers.findIndex(l => l.key === selected);
  selected = layers[Math.max(0, Math.min(layers.length - 1, i + delta))].key;
  sync();
}

layerSelect.onchange = e => { selected = e.target.value; sync(); };
assetPreset.onchange = e => updateSelected('path', e.target.value);
assetPath.onchange = e => updateSelected('path', e.target.value);
visible.onchange = e => updateSelected('visible', e.target.checked);
dx.oninput = dxRange.oninput = e => updateSelected('dx', e.target.value);
dy.oninput = dyRange.oninput = e => updateSelected('dy', e.target.value);
scale.oninput = scaleRange.oninput = e => updateSelected('scale', e.target.value);
rotation.oninput = rotationRange.oninput = e => updateSelected('rotation', e.target.value);

document.getElementById('selectPrev').onclick = () => selectByDelta(-1);
document.getElementById('selectNext').onclick = () => selectByDelta(1);
document.getElementById('resetLayer').onclick = () => {
  const i = layers.findIndex(l => l.key === selected);
  layers[i] = JSON.parse(JSON.stringify(defaults.find(l => l.key === selected)));
  sync();
};
document.getElementById('resetAll').onclick = () => {
  layers = JSON.parse(JSON.stringify(defaults));
  selected = 'outfit';
  sync();
};
document.getElementById('hideOthers').onclick = () => {
  for (const l of layers) l.visible = l.key === selected;
  sync();
};
document.getElementById('showAll').onclick = () => {
  for (const l of layers) {
    l.visible = Boolean(l.path);
  }
  sync();
};
document.getElementById('applyJson').onclick = () => {
  try {
    const parsed = JSON.parse(jsonBox.value);
    for (const l of layers) {
      const incoming = parsed.layers?.[l.key];
      if (!incoming) continue;
      l.path = incoming.path ? (incoming.path.startsWith('assets/') ? `../${incoming.path}` : incoming.path) : '';
      l.visible = Boolean(incoming.visible);
      l.dx = Number(incoming.dx || 0);
      l.dy = Number(incoming.dy || 0);
      l.scale = Number(incoming.scale || 1);
      l.rotation = Number(incoming.rotation || 0);
    }
    sync();
    setStatus('JSON применен');
  } catch (e) {
    setStatus(`Ошибка JSON: ${e.message}`);
  }
};

document.getElementById('copyJson').onclick = async () => {
  const text = JSON.stringify(layerExport(), null, 2);
  await copyText(text, 'JSON скопирован');
};

document.getElementById('copyDart').onclick = async () => {
  const data = layerExport().layers;
  const lines = ['const avatarLayerTweaks = <String, AvatarLayerTweak>{'];
  for (const [key, v] of Object.entries(data)) {
    lines.push(`  '${key}': AvatarLayerTweak(dx: ${v.dx}, dy: ${v.dy}, scale: ${v.scale}, visible: ${v.visible}),`);
  }
  lines.push('};');
  await copyText(lines.join('\n'), 'Карта Dart скопирована');
};

document.getElementById('downloadJson').onclick = () => {
  const blob = new Blob([JSON.stringify(layerExport(), null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'avatar_layer_tweaks.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

stage.addEventListener('pointerdown', e => {
  dragging = true;
  stage.setPointerCapture(e.pointerId);
  dragStart = { x: e.clientX, y: e.clientY, dx: current().dx, dy: current().dy };
});
stage.addEventListener('pointermove', e => {
  if (!dragging) return;
  const z = zoom();
  current().dx = dragStart.dx + (e.clientX - dragStart.x) / z;
  current().dy = dragStart.dy + (e.clientY - dragStart.y) / z;
  renderControls();
  renderStage();
});
stage.addEventListener('pointerup', () => { dragging = false; sync(); });
stage.addEventListener('pointercancel', () => { dragging = false; sync(); });

window.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;
  const step = e.shiftKey ? 5 : 1;
  const l = current();
  if (e.key === 'ArrowLeft') l.dx -= step;
  else if (e.key === 'ArrowRight') l.dx += step;
  else if (e.key === 'ArrowUp') l.dy -= step;
  else if (e.key === 'ArrowDown') l.dy += step;
  else return;
  e.preventDefault();
  sync();
});

document.querySelectorAll('[data-nudge]').forEach(button => {
  button.addEventListener('click', () => {
    const [x, y] = button.dataset.nudge.split(',').map(Number);
    const l = current();
    l.dx += x;
    l.dy += y;
    sync();
  });
});

document.querySelectorAll('[data-scale]').forEach(button => {
  button.addEventListener('click', () => {
    const l = current();
    l.scale = Number(clamp(l.scale + Number(button.dataset.scale), 0.1, 1.8).toFixed(3));
    sync();
  });
});

document.querySelectorAll('[data-rotate]').forEach(button => {
  button.addEventListener('click', () => {
    const l = current();
    l.rotation = Number(clamp((l.rotation || 0) + Number(button.dataset.rotate), -180, 180).toFixed(1));
    sync();
  });
});

window.addEventListener('resize', renderStage);

sync();
</script>
